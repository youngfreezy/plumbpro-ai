[alembic]
# Path to migration environment
script_location = backend/alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path so that backend package is importable
prepend_sys_path = .

# Timezone for revision creation
timezone = UTC

# The database URL is set programmatically in env.py from Settings.
# This value is intentionally left blank.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
